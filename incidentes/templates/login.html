<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>SomaSafe - Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <style>
      body {
        background: linear-gradient(90deg, #0f3d56, #12475f);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
      }

      .login-card {
        width: 450px;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .logo {
        text-align: center;
        margin-bottom: 20px;
      }

      .logo h1 {
        color: #0f3d56;
        font-weight: bold;
      }

      .subtitulo {
        text-align: center;
        color: #6c757d;
        margin-bottom: 30px;
      }

      .btn-login {
        background: #ff6b2c;
        border: none;
        color: white;
        font-weight: bold;
        padding: 12px;
      }

      .btn-login:hover {
        background: #e65a1f;
      }

      .footer-text {
        text-align: center;
        color: #999;
        margin-top: 25px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <div class="logo">
        <h1>SomaSafe</h1>
        <p>Sistema de Gestión de Incidentes</p>
      </div>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Ingresa tu usuario"
            required />
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Ingresa tu contraseña"
            required />
        </div>

        <button type="submit" class="btn btn-login w-100">
          Iniciar sesión
        </button>
      </form>

      {% if error %}
      <div class="alert alert-danger mt-3">{{ error }}</div>
      {% endif %}

      <div class="footer-text">Protegiendo la seguridad en cada turno</div>
    </div>
  </body>
</html>
