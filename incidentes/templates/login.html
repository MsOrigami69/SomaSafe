<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - SomaSafe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card p-4 shadow">
            <h2 class="text-center mb-4">Iniciar Sesión</h2>

            <form method="POST">
              {% csrf_token %}

              <div class="mb-3">
                <label>Usuario</label>
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  required />
              </div>

              <div class="mb-3">
                <label>Contraseña</label>
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  required />
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Ingresar
              </button>
            </form>

            {% if error %}
            <p class="text-danger mt-2 text-center">{{ error }}</p>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
