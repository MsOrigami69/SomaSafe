<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registrar Incidente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <style>
      body {
        background-color: #f4f6f8;
      }

      .header {
        background-color: #0f3d56;
        color: white;
        padding: 25px;
        text-align: center;
      }

      .card-custom {
        border: none;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 class="mb-0">Registrar Incidente</h1>
      <p class="mb-0">
        Sistema SomaSafe - Gestión de incidentes de seguridad minera
      </p>
    </div>

    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
          <div class="card shadow card-custom">
            <div class="card-body p-4">
              <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                  <label class="form-label">{{ form.tipo.label }}</label>
                  {{ form.tipo }}
                </div>

                <div class="mb-3">
                  <label class="form-label">{{ form.fecha.label }}</label>
                  {{ form.fecha }}
                </div>

                <div class="mb-3">
                  <label class="form-label">{{ form.descripcion.label }}</label>
                  {{ form.descripcion }}
                </div>

                <div class="mb-3">
                  <label class="form-label">{{ form.ubicacion.label }}</label>
                  {{ form.ubicacion }}
                </div>

                <div class="mb-4">
                  <label class="form-label">{{ form.estado.label }}</label>
                  {{ form.estado }}
                </div>

                <div class="d-flex gap-2 flex-wrap">
                  <button type="submit" class="btn btn-success">
                    Guardar incidente
                  </button>
                  <a href="/" class="btn btn-secondary">Volver al inicio</a>
                  <a href="/incidentes/" class="btn btn-primary"
                    >Ver lista de incidentes</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
