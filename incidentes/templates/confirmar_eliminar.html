<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Confirmar eliminación</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow p-4 mx-auto" style="max-width: 600px">
        <h2 class="text-danger mb-3">Confirmar eliminación</h2>

        <p>¿Deseas eliminar este incidente?</p>

        <div class="alert alert-warning">
          <strong>Tipo:</strong> {{ incidente.tipo }} <br />
          <strong>Fecha:</strong> {{ incidente.fecha }} <br />
          <strong>Ubicación:</strong> {{ incidente.ubicacion }}
        </div>

        <form method="POST">
          {% csrf_token %}

          <button type="submit" class="btn btn-danger">Sí, eliminar</button>

          <a href="{% url 'lista_incidentes' %}" class="btn btn-secondary">
            No, volver a la lista
          </a>
        </form>
      </div>
    </div>
  </body>
</html>
